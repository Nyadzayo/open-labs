name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lab:
          - labs/01-idempotent-payments
          - labs/02-webhook-processing
          - labs/03-payment-state-machine
          - labs/04-ledger-invariants
          - labs/05-reconciliation-engine
          - labs/06-retry-patterns
          - labs/07-k8s-payment-deploy
          - labs/08-payment-monitoring
          - labs/09-async-settlement
          - labs/10-event-driven-payments
          - labs/11-api-contract-testing
          - labs/12-rate-limiter
          - labs/13-terraform-basics
          - labs/14-fraud-rule-engine
          - labs/15-kyc-pipeline
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest ${{ matrix.lab }}/ -v --tb=short

      - name: Lint
        run: ruff check ${{ matrix.lab }}/

      - name: Type check
        run: mypy ${{ matrix.lab }}/ --ignore-missing-imports

  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - name: Type check all labs
        run: |
          for lab in labs/[0-9]*/; do
            echo "::group::mypy $lab"
            mypy "$lab" --ignore-missing-imports
            echo "::endgroup::"
          done
