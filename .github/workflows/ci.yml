name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lab:
          - labs/01-idempotent-payments
          - labs/02-webhook-processing
          - labs/03-payment-state-machine
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest ${{ matrix.lab }}/ -v --tb=short

      - name: Lint
        run: ruff check ${{ matrix.lab }}/

      - name: Type check
        run: mypy ${{ matrix.lab }}/ --ignore-missing-imports

  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy labs/ --ignore-missing-imports
